<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noai, noimageai, noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noai, noimageai, noindex, nofollow">
<meta name="GPTBot" content="noindex, nofollow">
<meta name="ChatGPT-User" content="noindex, nofollow">
<meta name="ClaudeBot" content="noindex, nofollow">
<meta name="anthropic-ai" content="noindex, nofollow">
<meta name="PerplexityBot" content="noindex, nofollow">
<meta name="CCBot" content="noindex, nofollow">
<title>Adivinar numero</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(160deg, #1e293b, #0f172a);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    color: #e2e8f0;
  }
  .panel {
    position: relative;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 28px;
    width: 100%; max-width: 620px;
    box-shadow: 0 20px 50px rgba(0,0,0,.45);
  }
  h1 { font-size: 1.4rem; text-align: center; margin-bottom: 22px; font-weight: 600; }

  .campo { margin-bottom: 18px; }
  .campo > label { display: block; font-size: .85rem; color: #94a3b8; margin-bottom: 8px; }
  #numero {
    width: 100%; padding: 14px; font-size: 1.6rem; text-align: center;
    border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #fff;
  }
  #numero.error { border-color: #ef4444; }
  .btn-principal {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    background: #38bdf8; color: #08263a; font-size: 1.1rem; font-weight: 700; cursor: pointer;
  }
  .btn-principal:hover { background: #7dd3fc; }

  .barra { height: 8px; background: #0f172a; border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .barra-fill { height: 100%; background: #38bdf8; transition: width .3s ease; }
  .cabecera { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  #progreso { font-size: .95rem; color: #94a3b8; }
  .chip {
    background: #0f172a; border: 1px solid #334155; padding: 8px 16px;
    border-radius: 99px; font-weight: 600; font-size: .9rem; color: #94a3b8;
  }
  .chip span { color: #38bdf8; font-size: 1.2rem; font-weight: 800; }

  .escena {
    background: #f8fafc; border-radius: 16px; padding: 44px 20px; min-height: 260px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  .num-grande, .equis {
    font-size: 5.6rem; font-weight: 800; line-height: 1; animation: aparece .3s ease;
  }
  .num-grande { color: #1e3a8a; }
  .num-grande.c1 { color: #111111; }
  .num-grande.c2 { color: #d62828; }
  .num-grande.c3 { color: #1f9d41; }
  .equis { color: #ef4444; }
  .etiqueta {
    font-size: 1.25rem; font-weight: 700; letter-spacing: 1px;
    padding: 9px 24px; border-radius: 99px;
  }
  .etiqueta.si { background: #dcfce7; color: #15803d; }
  .etiqueta.no { background: #fee2e2; color: #dc2626; }
  @keyframes aparece { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  #siguiente { margin-top: 14px; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="panel">
  <h1>Adivinar numero</h1>

  <section id="inicio">
    <div class="campo">
      <label for="numero">Número</label>
      <input type="number" id="numero" inputmode="numeric">
    </div>
    <button type="button" id="comenzar" class="btn-principal">Comenzar</button>
  </section>

  <section id="paso" hidden>
    <div class="barra"><div class="barra-fill" id="barraFill"></div></div>
    <div class="cabecera">
      <div id="progreso"></div>
      <div class="chip">Nº <span id="numActual"></span></div>
    </div>
    <div id="escenario"></div>
    <button type="button" id="siguiente" class="btn-principal">Siguiente</button>
  </section>
</div>

<script>
  const C = {
    1: { n: 'NEGRO', h: '#1a1a1a' },
    2: { n: 'ROJO',  h: '#d62828' },
    3: { n: 'VERDE', h: '#1f9d41' }
  };

  const LO = 1, HI = 1000;
  const T  = Math.ceil(Math.log(HI + 1) / Math.log(4));

  const s = { num: 0, i: 0 };

  const inicio    = document.getElementById('inicio');
  const paso      = document.getElementById('paso');
  const inputNum  = document.getElementById('numero');
  const escenario = document.getElementById('escenario');
  const btnSig    = document.getElementById('siguiente');

  document.getElementById('comenzar').addEventListener('click', iniciar);
  btnSig.addEventListener('click', siguiente);
  inputNum.addEventListener('keydown', e => { if (e.key === 'Enter') iniciar(); });
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && !paso.hidden) siguiente(); });

  function iniciar() {
    const v = parseInt(inputNum.value, 10);
    if (isNaN(v) || v < LO || v > HI) { inputNum.classList.add('error'); return; }
    inputNum.classList.remove('error');
    s.num = v;
    s.i   = 0;
    inicio.hidden = true;
    paso.hidden   = false;
    pintar();
  }

  function siguiente() {
    s.i++;
    if (s.i >= T) {
      paso.hidden   = true;
      inicio.hidden = false;
      return;
    }
    pintar();
  }

  function pintar() {
    const i = s.i, n = s.num;
    const d = Math.floor(n / Math.pow(4, i)) % 4;

    document.getElementById('progreso').textContent = `Paso ${i + 1} de ${T}`;
    document.getElementById('numActual').textContent = n;
    document.getElementById('barraFill').style.width = ((i + 1) / T * 100) + '%';
    btnSig.textContent = (i === T - 1) ? 'Volver al inicio' : 'Siguiente';

    if (d !== 0) {
      escenario.innerHTML =
        `<div class="escena">` +
          `<div class="num-grande c${d}">${n}</div>` +
          `<div class="etiqueta si">color ${C[d].n}</div>` +
        `</div>`;
    } else {
      escenario.innerHTML =
        `<div class="escena">` +
          `<div class="equis">✗</div>` +
          `<div class="etiqueta no">NO ESTÁ</div>` +
        `</div>`;
    }
  }
</script>
</body>
</html>
